<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="文字数カウントツールへのお問い合わせページです。ご意見、不具合報告、改善要望などを送るための仮フォームを掲載しています。">
  <title>お問い合わせ | 文字数カウント</title>
  <link rel="stylesheet" href="style.css">
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9092971490160530"
     crossorigin="anonymous"></script>
</head>
<body>
  <nav class="site-nav" aria-label="サイト内ナビゲーション">
    <a href="index.html">ホーム</a>
    <a href="privacy.html">プライバシーポリシー</a>
    <a href="contact.html">お問い合わせ</a>
    <a href="about.html">このサイトについて</a>
  </nav>

  <main class="simple-page">
    <article class="content-page">
      <p class="eyebrow">Contact</p>
      <h1>お問い合わせ</h1>
      <p>ご意見、不具合報告、改善要望などがありましたら、以下のフォームをご利用ください。現在このフォームは見た目のみで、送信機能はまだ実装していません。</p>

      <form class="contact-form" action="#" method="post">
        <div class="form-field">
          <label for="name">お名前</label>
          <input type="text" id="name" name="name" placeholder="山田 太郎">
        </div>

        <div class="form-field">
          <label for="email">メールアドレス</label>
          <input type="email" id="email" name="email" placeholder="example@example.com">
        </div>

        <div class="form-field">
          <label for="message">お問い合わせ内容</label>
          <textarea id="message" name="message" placeholder="お問い合わせ内容を入力してください"></textarea>
        </div>

        <button type="button" class="btn btn-primary">送信する</button>
      </form>
    </article>
  </main>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>文字数カウントツール【無料・高機能】文字数/空白なし/行数を即チェック</title>
  <meta name="description" content="無料で使える高機能な文字数カウントツールです。文字数、空白なし文字数、行数をリアルタイムで確認可能。レポート、作文、小説、SNS投稿、ブログ執筆に便利。PC・スマホ対応で今すぐ使えます。">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="stylesheet" href="style.css">
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9092971490160530"
     crossorigin="anonymous"></script>
</head>
<body>
  <nav class="site-nav" aria-label="サイト内ナビゲーション">
    <a href="index.html">ホーム</a>
    <a href="privacy.html">プライバシーポリシー</a>
    <a href="contact.html">お問い合わせ</a>
    <a href="about.html">このサイトについて</a>
  </nav>

  <div class="page-layout">
    <aside class="ad-space ad-space-side ad-space-left" aria-label="左広告スペース">
      <div class="ad-inner">
        <!-- ここに広告コードを入れる -->
        <span>広告スペース</span>
      </div>
    </aside>

    <div class="content-column">
      <main class="app">
        <section class="workspace" aria-labelledby="app-title">
          <div class="header">
            <div>
              <p class="eyebrow">Text Counter</p>
              <h1 id="app-title">文字数カウント</h1>
            </div>
            <div class="status" id="copyStatus" aria-live="polite"></div>
          </div>

          <div class="editor-wrap">
            <textarea id="textInput" placeholder="ここに文章を入力してください" aria-label="カウントする文章"></textarea>
          </div>

          <div class="actions">
            <button type="button" class="btn btn-primary" id="copyButton">コピー</button>
            <button type="button" class="btn btn-secondary" id="clearButton">クリア</button>
          </div>
        </section>

        <section class="stats" aria-label="カウント結果">
          <article class="stat-card">
            <span class="stat-label">文字数</span>
            <strong class="stat-value" id="charCount">0</strong>
          </article>
          <article class="stat-card">
            <span class="stat-label">空白抜き</span>
            <strong class="stat-value" id="charNoSpaceCount">0</strong>
          </article>
          <article class="stat-card">
            <span class="stat-label">行数</span>
            <strong class="stat-value" id="lineCount">0</strong>
          </article>
          <article class="stat-card">
            <span class="stat-label">単語数</span>
            <strong class="stat-value" id="wordCount">0</strong>
          </article>
        </section>
      </main>

      <aside class="ad-space ad-space-mobile" aria-label="広告スペース">
        <div class="ad-inner">
          <!-- ここに広告コードを入れる -->
          <span>広告スペース</span>
        </div>
      </aside>
    </div>

    <aside class="ad-space ad-space-side ad-space-right" aria-label="右広告スペース">
      <div class="ad-inner">
        <!-- ここに広告コードを入れる -->
        <span>広告スペース</span>
      </div>
    </aside>
  </div>

  <script src="script.js"></script>
</body>
</html>
